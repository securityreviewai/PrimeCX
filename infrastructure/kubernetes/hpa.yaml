apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: primecx-backend-hpa
  namespace: primecx
  labels:
    app: primecx-backend
    app.kubernetes.io/part-of: primecx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: primecx-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
