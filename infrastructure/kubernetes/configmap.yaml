apiVersion: v1
kind: ConfigMap
metadata:
  name: primecx-config
  namespace: primecx
  labels:
    app.kubernetes.io/part-of: primecx
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://primecx-db:5432/primecx
  SPRING_PROFILES_ACTIVE: production
  AWS_S3_BUCKET_NAME: primecx-recordings
  AWS_REGION: us-west-2
  SERVER_PORT: "8080"
  OKTA_ISSUER: https://your-org.okta.com/oauth2/default
  OPENAI_MODEL: gpt-4o
  OPENAI_BASE_URL: https://api.openai.com/v1
